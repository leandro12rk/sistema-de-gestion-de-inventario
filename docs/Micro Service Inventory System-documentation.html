t) llamado probablemente \"Local\". Aseg\xFArate de que tenga las siguientes variables:\n\n    baseUrl: http://localhost:9000/api/v01\n\n    productServiceUrl: http://localhost:9090\n\n    \uD83D\uDCCC Mejores Pr\xE1cticas al Probar\n    Filtros: Para el Product Service, puedes filtrar por proveedor usando el par\xE1metro ?supplierName=.\n\n    Validaci\xF3n: Todas las peticiones POST y PUT requieren un cuerpo en formato JSON. Verifica que no falte el campo name para evitar errores 400.\n\n    Orden de ejecuci\xF3n: Se recomienda crear primero un Producto antes de intentar actualizar su Inventario.\n\n    \uD83D\uDCDE Contacto y Soporte\n    Desarrollador: Leandro\n\n    Repositorio: GitHub - SistemaDeGestionDeInventario\n  type: text/markdown\nbundled: true\nextensions:\n  bruno:\n    ignore:\n      - node_modules\n      - .git\n    exportedAt: '2026-04-17T16:46:52.018Z'\n    exportedUsing: Bruno/3.2.2\n";
