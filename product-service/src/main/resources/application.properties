spring.application.name=product-service


server.port=9090
# Todas las rutas ahora empezar·n con /api/v01/producto
server.servlet.context-path=/api/v01/products

# ConfiguraciÛn de Base de Datos
spring.datasource.url=jdbc:postgresql://localhost:5435/product_db
spring.datasource.username=adminUser
spring.datasource.password=admin

# ConfiguraciÛn de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Esto hace que cada vez que uses findAll(), veas el SQL real en la consola
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# --- EUREKA CLIENT ---
# ConexiÛn a Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- CONFIGURACI”N DE FEIGN (Opcional) ---
# Tiempo de espera para conectar con otros microservicios (en ms)
feign.client.config.default.connect-timeout=5000
feign.client.config.default.read-timeout=5000


# --- LOGS ---
logging.level.io.github.leandro12rk.product=DEBUG